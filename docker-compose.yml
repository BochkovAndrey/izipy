services:
  # Проверка конфигурации перед запуском
  validate-config:
    image: alpine:3.19
    container_name: validate-config
    restart: "no"
    profiles:
      - setup
    volumes:
      - ./:/workspace:ro
    command: 
      - sh
      - -c
      - |
        apk add --no-cache yq curl &&
        echo '🔍 Validating configuration files...' &&
        
        if [ ! -f /workspace/.env ]; then
          echo '❌ .env file not found! Please create .env file with required variables.'
          exit 1
        fi &&
        
        # Проверка YAML файлов в папке configs
        for file in /workspace/configs/prometheus.yml /workspace/configs/alertmanager.yml /workspace/configs/blackbox.yml /workspace/configs/statsd.yml; do
          if [ -f "$$file" ]; then
            if yq eval '.' "$$file" > /dev/null 2>&1; then
              echo "✅ $$file is valid"
            else
              echo "❌ Invalid YAML in $$file"
              exit 1
            fi
          else
            echo "❌ $$file not found! Please create it."
            exit 1
          fi
        done &&
        
        # Проверка alerts.yml
        if [ ! -f /workspace/configs/alerts.yml ]; then
          echo "❌ alerts.yml not found in configs folder!"
          exit 1
        else
          echo "✅ configs/alerts.yml exists"
        fi &&
        
        # Проверка datasource.yml для Grafana
        if [ ! -f /workspace/configs/datasource.yml ]; then
          echo "⚠️  datasource.yml not found, Grafana may not have datasource configured"
        else
          echo "✅ configs/datasource.yml exists"
        fi &&
        
        echo '✅ All configurations valid!'
    networks:
      - backend
    env_file:
      - .env

  # Создание необходимых директорий на хосте
  prepare-dirs:
    image: alpine:3.19
    container_name: prepare-dirs
    restart: "no"
    profiles:
      - setup
    volumes:
      - ./:/workspace
    command:
      - sh
      - -c
      - |
        echo '📁 Creating directories...' &&
        mkdir -p /workspace/dags /workspace/logs /workspace/plugins &&
        mkdir -p /workspace/backups &&
        chmod 750 /workspace/dags /workspace/plugins &&
        chmod 755 /workspace/logs &&
        chmod 755 /workspace/backups &&
        
        if [ ! -f /workspace/.env ]; then
          echo '⚠️  .env file not found! Please create it with required variables.'
          exit 1
        fi &&
        
        echo '✅ Directories created successfully!'
    networks:
      - backend
    env_file:
      - .env

  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - type: tmpfs
        target: /docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} pg_isready -U ${POSTGRES_USER} -d postgres && PGPASSWORD=${POSTGRES_PASSWORD} psql -U ${POSTGRES_USER} -d postgres -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - backend
      - monitoring
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1g
    cpus: 1
    command: >
      bash -c "
        docker-entrypoint.sh postgres &
        PID=\$$!
        
        echo '⏳ Waiting for PostgreSQL to start...'
        until pg_isready -U \${POSTGRES_USER}; do
          sleep 2
        done
        
        echo '🔍 Checking and creating additional databases...'
        
        # Функция для проверки существования базы данных с передачей пароля
        database_exists() {
          PGPASSWORD=\${POSTGRES_PASSWORD} psql -U \${POSTGRES_USER} -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='\$$1'\" | grep -q 1
        }
        
        # Создание базы данных Airflow
        if database_exists 'airflow'; then
          echo '✅ Database airflow already exists'
        else
          echo '📦 Creating database airflow...'
          PGPASSWORD=\${POSTGRES_PASSWORD} psql -U \${POSTGRES_USER} -d postgres -c 'CREATE DATABASE airflow'
          echo '✅ Database airflow created'
        fi
        
        # Создание базы данных Superset
        if database_exists 'superset'; then
          echo '✅ Database superset already exists'
        else
          echo '📦 Creating database superset...'
          PGPASSWORD=\${POSTGRES_PASSWORD} psql -U \${POSTGRES_USER} -d postgres -c 'CREATE DATABASE superset'
          echo '✅ Database superset created'
        fi
        
        echo '🎉 Database initialization completed!'
        
        # Ждем завершения основного процесса PostgreSQL
        wait \$$PID
      "

  redis:
    image: redis:${REDIS_VERSION}
    container_name: redis
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
      - monitoring
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 0.5

  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_VERSION}
    container_name: pgadmin
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: prometheus
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - monitoring
      - frontend         # Для отладки алертов, НЕ ДЕПЛОИТЬ В ПРОД!
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      validate-config:
        condition: service_completed_successfully
        required: false

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: grafana
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./configs/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - frontend
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION}
    container_name: node-exporter
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION}
    container_name: cadvisor
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    privileged: true
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:${POSTGRES_EXPORTER_VERSION}
    container_name: postgres-exporter
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitoring
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis-exporter:
    image: oliver006/redis_exporter:${REDIS_EXPORTER_VERSION}
    container_name: redis-exporter
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - monitoring
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  blackbox-exporter:
    image: prom/blackbox-exporter:${BLACKBOX_EXPORTER_VERSION}
    container_name: blackbox-exporter
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    volumes:
      - ./configs/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9115/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:${ALERTMANAGER_VERSION}
    container_name: alertmanager
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      WEBHOOK_URL: ${WEBHOOK_URL}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN}
    volumes:
      - ./configs/alertmanager.yml:/etc/alertmanager/config.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    ports:
      - "9093:9093"
    networks:
      - monitoring
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  statsd-exporter:
    image: prom/statsd-exporter:${STATSD_EXPORTER_VERSION}
    container_name: statsd-exporter
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    volumes:
      - ./configs/statsd.yml:/etc/statsd-exporter/mapping.yml:ro
    command:
      - '--statsd.mapping-config=/etc/statsd-exporter/mapping.yml'
      - '--web.listen-address=:9102'
      - '--statsd.listen-udp=:9125'
    ports:
      - "9102:9102"
      - "9125:9125/udp"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9102/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.3

  airflow-webserver:
    image: apache/airflow:${AIRFLOW_VERSION}-python3.11
    container_name: airflow-webserver
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      # База данных
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    
      # Core настройки
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    
      # Secret keys
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      # Webserver
      AIRFLOW__WEBSERVER__RBAC: 'true'
    
      # Celery
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    
      # Метрики
      AIRFLOW__METRICS__STATSD_ON: 'true'
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
    
    ports:
      - "8080:8080"
  
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins:ro
  
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
  
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
      
    command: >
      bash -c "
        echo '🚀 Waiting for PostgreSQL to be fully ready...'
        
        MAX_RETRIES=30
        RETRY_COUNT=0
    
        while [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; do
          echo \"⏳ Checking PostgreSQL connection (attempt $$((RETRY_COUNT+1))/$$MAX_RETRIES)...\"
        
          if PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U ${POSTGRES_USER} -d airflow -c 'SELECT 1' > /dev/null 2>&1; then
            echo '✅ PostgreSQL is ready!'
            break
          fi
        
          RETRY_COUNT=$$((RETRY_COUNT+1))
        
          if [ $$RETRY_COUNT -eq $$MAX_RETRIES ]; then
            echo '❌ PostgreSQL not ready after $$MAX_RETRIES attempts'
            exit 1
          fi
        
          sleep 5
        done
    
        echo '🚀 Initializing Airflow database...'
        airflow db migrate
        echo '✅ Airflow database initialized'

        echo '✅ Airflow ready, starting api-server...'

        exec airflow api-server
      "
  
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      statsd-exporter:
        condition: service_healthy
  
    networks:
      - backend
      - monitoring
      - frontend
  
    env_file:
      - .env
  
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
    mem_limit: 1g
    cpus: 1

  airflow-scheduler:
    image: apache/airflow:${AIRFLOW_VERSION}-python3.11
    container_name: airflow-scheduler
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AIRFLOW__METRICS__STATSD_ON: 'true'
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins:ro
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    command: >
      bash -c "
        echo '🚀 Waiting for Airflow webserver to initialize database...'
        sleep 30
        exec airflow scheduler
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      statsd-exporter:
        condition: service_healthy
      airflow-webserver:
        condition: service_started
    networks:
      - backend
      - monitoring
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1g
    cpus: 1

  airflow-worker:
    image: apache/airflow:${AIRFLOW_VERSION}-python3.11
    container_name: airflow-worker
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AIRFLOW__METRICS__STATSD_ON: 'true'
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins:ro
      - ./configs/check_redis.py:/opt/airflow/check_redis.py:ro  # Монтируем скрипт
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    command: >
      bash -c "
        echo '🚀 Waiting for services...'
        sleep 10
    
        echo 'Checking Redis connection...'
        python /opt/airflow/check_redis.py
    
        if [ \$? -ne 0 ]; then
            echo '❌ Failed to connect to Redis. Exiting...'
            exit 1
        fi
    
        echo '✅ All dependencies ready. Starting Celery worker...'
        exec airflow celery worker
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - monitoring
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1g
    cpus: 1
    healthcheck:
      test: ["CMD-SHELL", "celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d \"celery@$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
      
            
  superset:
    image: apache/superset:${SUPERSET_VERSION:-latest}
    container_name: superset
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      # База данных
      SUPERSET__SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER:-superset}:${POSTGRES_PASSWORD:-superset}@postgres:5432/${POSTGRES_DB:-superset}
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-your-secret-key-change-in-production}
      
      # Redis (исправлено: убраны вложенные переменные)
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/1
      SUPERSET__CACHE_CONFIG: '{"CACHE_TYPE": "RedisCache", "CACHE_DEFAULT_TIMEOUT": 300, "CACHE_KEY_PREFIX": "superset_", "CACHE_REDIS_URL": "redis://:${REDIS_PASSWORD}@redis:6379/1"}'
      
      # Superset
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_LOAD_EXAMPLES: 'false'
      SUPERSET_LOG_LEVEL: INFO
      
      # Admin
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
      
      # PostgreSQL для скрипта
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-superset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superset}
      POSTGRES_DB: ${POSTGRES_DB:-superset}
    
    volumes:
      - ./configs/superset_config.py:/app/superset_config.py:ro
      - superset-data:/app/superset_home
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    
    entrypoint: |
      bash -c '
      set -e
      
      # Установка зависимостей
      pip install --no-cache-dir --user psycopg2-binary redis 2>/dev/null || true
      
      # Ожидание PostgreSQL
      echo "Ожидание PostgreSQL..."
      for i in {1..30}; do
        if python -c "import psycopg2; psycopg2.connect(host=\"$POSTGRES_HOST\", user=\"$POSTGRES_USER\", password=\"$POSTGRES_PASSWORD\", dbname=\"$POSTGRES_DB\")" 2>/dev/null; then
          echo "PostgreSQL доступен"
          break
        fi
        sleep 2
      done
      
      # Инициализация Superset
      superset db upgrade
      
      # Создание admin
      superset fab create-admin \
        --username "$SUPERSET_ADMIN_USERNAME" \
        --password "$SUPERSET_ADMIN_PASSWORD" \
        --email "$SUPERSET_ADMIN_EMAIL" \
        --firstname Admin --lastname User
      
      superset init
      
      # Запуск
      exec gunicorn \
        --bind 0.0.0.0:8088 \
        --workers 4 --threads 20 \
        --timeout 120 \
        --access-logfile - \
        --error-logfile - \
        "superset.app:create_app()"
      '
    
    networks:
      - backend
      - monitoring
      - frontend
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    mem_limit: 2g
    cpus: 2


      
    
  backup-service:
    profiles:
      - production
    image: postgres:${POSTGRES_VERSION}-alpine
    container_name: db-backup
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    volumes:
      - ./backups:/backups:rw
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST} 
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache postgresql-client
        
        echo "🕐 Backup service started at $$(date)"
        echo "📊 Retention: ${BACKUP_RETENTION_DAYS} days, Interval: ${BACKUP_INTERVAL_HOURS} hours"
        
        while true; do
          BACKUP_FILE="/backups/backup-$$(date +%Y%m%d_%H%M%S).sql.gz"
          echo "📦 Creating database backup: $$(basename $$BACKUP_FILE)"
          
          if PGPASSWORD=${POSTGRES_PASSWORD} pg_dump -h ${POSTGRES_HOST} \
             -U ${POSTGRES_USER} \
             -d ${POSTGRES_DB} \
             --clean --if-exists | gzip > $$BACKUP_FILE; then
            echo "✅ Backup created successfully ($$(du -h $$BACKUP_FILE | cut -f1))"
            
            # Clean old backups
            find /backups -name "backup-*.sql.gz" -mtime +${BACKUP_RETENTION_DAYS} -delete 2>/dev/null || true
            echo "🧹 Cleaned backups older than ${BACKUP_RETENTION_DAYS} days"
          else
            echo "❌ Backup failed!"
          fi
          
          echo "💤 Next backup in ${BACKUP_INTERVAL_HOURS} hours"
          sleep $$((BACKUP_INTERVAL_HOURS * 3600))
        done
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.3

  health-check:
    image: alpine:3.19
    container_name: health-check
    restart: "no"
    profiles:
      - tools
      - debug
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        echo '🏥 Running health checks...'
        
        # Define services to check
        services='airflow-webserver:8080 superset:8088 pgadmin:80 grafana:3000 prometheus:9090 alertmanager:9093'
        
        for service in $$services; do
          echo -n "Checking $$service... "
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://$$service/ 2>/dev/null || echo "Failed")
          
          case $$HTTP_CODE in
            200|302|401|403)
              echo "✅ Healthy (HTTP $$HTTP_CODE)"
              ;;
            Failed)
              echo "❌ Connection failed"
              ;;
            *)
              echo "⚠️  Unexpected response: HTTP $$HTTP_CODE"
              ;;
          esac
        done
        
        # Check exporters
        echo ''
        echo '📊 Checking exporters...'
        exporters='node-exporter:9100 cadvisor:8080 postgres-exporter:9187 redis-exporter:9121 blackbox-exporter:9115 statsd-exporter:9102'
        
        for exporter in $$exporters; do
          echo -n "Checking $$exporter... "
          if curl -s -o /dev/null http://$$exporter/metrics 2>/dev/null; then
            echo "✅ Metrics available"
          else
            echo "❌ Metrics not available"
          fi
        done
        
        echo ''
        echo '✅ Health checks completed!'
    networks:
      - frontend
      - monitoring
      - backend
    env_file:
      - .env
    mem_limit: 128m
    cpus: 0.2
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
  redis-data:
  superset-data:
  pgadmin-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:

networks:
  frontend:
    driver: bridge
    name: frontend-network
  backend:
    driver: bridge
    name: backend-network
    internal: true
  monitoring:
    driver: bridge
    name: monitoring-network
    internal: true